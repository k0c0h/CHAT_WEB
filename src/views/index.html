<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/chat.css" />
  <link rel="icon" href="/img/logo.jpg" type="image/jpg">
  <title>LiveChat</title>

</head>

<body>
  <header class="site-header shadow-sm">
    <div class="container py-3">
      <h1 class="h3 mb-0 fw-bold">LiveChat</h1>
    </div>
  </header>
  <main class="container py-3 py-md-4">
    <section class="chat-shell card border-0 shadow-lg">
      <div class="card-body d-flex flex-column gap-3">
        <div class="chat-title d-flex align-items-center justify-content-between">
          <div>
            <h2 class="h5 mb-1 fw-bold">Sala de conversación</h2>
          </div>
        </div>
        <div id="chat-date" class="chat-date text-center small fw-semibold"></div>
        <div id="all-messages" class="messages-list"></div>
        <div id="typing-indicator" class="typing-indicator text-success-emphasis small d-none" aria-live="polite"></div>
        <form class="send-message row g-2 align-items-center" id="message-form" autocomplete="off">
          <div class="col-12 col-md">
            <input type="text" id="message" class="form-control chat-input" placeholder="Escribe tu mensaje..."
              aria-label="Mensaje" />
          </div>
          <div class="col-12 col-md-auto">
            <button id="send-message" type="submit" class="btn btn-success btn-send w-100">
              Enviar
            </button>
          </div>
        </form>
      </div>
    </section>
  </main>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/script.js"></script>
</body>

</html>
