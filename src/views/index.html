<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/chat.css" />
  <link rel="icon" href="/img/logo.jpg" type="image/jpg">
  <title>LiveChat</title>

</head>

<body>
  <header class="site-header shadow-sm">
    <div class="container py-3">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
        <div>
          <p class="text-uppercase mb-1 header-kicker">ESPE-Alert</p>
          <h1 class="h3 mb-0 fw-bold">Centro de Control de Emergencias</h1>
        </div>
        <div class="header-badge">
          Emisor: <strong id="emitter-name">Usuario</strong>
        </div>
      </div>
    </div>
  </header>
  <main class="container py-3 py-md-4 dashboard-page">
    <section class="dashboard-grid">
      <article class="control-panel card border-0 shadow-lg">
        <div class="card-body p-4 p-md-5 d-flex flex-column gap-4">
          <div>
            <p class="panel-eyebrow mb-2">Panel de emisión</p>
            <h2 class="h3 fw-bold mb-2">Enviar alerta inmediata</h2>
          </div>

          <div class="alert-ribbon">
            <div>
              <span class="ribbon-label">Fecha</span>
              <strong id="dashboard-date"></strong>
            </div>
          </div>

          <form class="send-message alert-form" id="alert-form" autocomplete="off">
            <div class="field-group mb-3">
              <label for="alert-type" class="form-label fw-semibold text-danger-emphasis">Tipo de alerta</label>
              <select id="alert-type" class="form-select form-select-lg chat-input">
                <option value="Crítica">Crítica</option>
                <option value="Preventiva">Preventiva</option>
                <option value="Informativa">Informativa</option>
                <option value="Simulacro">Simulacro</option>
              </select>
            </div>
            <div class="field-group mb-3">
              <label for="alert-message" class="form-label fw-semibold text-danger-emphasis">Mensaje de emergencia</label>
              <textarea id="alert-message" class="form-control chat-textarea" rows="4" placeholder="Describe la alerta, ubicación o instrucciones..."></textarea>
            </div>
            <div class="d-grid d-sm-flex gap-2">
              <button id="send-alert" type="submit" class="btn btn-danger btn-send">
                Emitir alerta
              </button>
            </div>
          </form>
        </div>
      </article>

      <article class="alerts-feed card border-0 shadow-lg">
        <div class="card-body p-4 p-md-5 d-flex flex-column gap-3">
          <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
            <div>
              <h2 class="h4 fw-bold mb-0">Alertas recibidas</h2>
            </div>
          </div>
          <div id="all-alerts" class="alerts-list" aria-live="polite"></div>
        </div>
      </article>
    </section>
  </main>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/script.js"></script>
</body>

</html>
