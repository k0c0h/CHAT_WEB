<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/register.css" />
    <title>Registrate</title>
  </head>
  <body>
    <header class="site-header shadow-sm">
      <div class="container py-3">
        <h1 class="h3 mb-0 fw-bold">ESPEChat</h1>
        <p class="mb-0 text-white-50 small">Acceso rápido y responsive</p>
      </div>
    </header>
    <main class="container py-4 py-md-5">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">
          <form action="#" method="post" class="card register-card border-0 shadow-lg" id="form">
            <div class="card-body p-4 p-md-5">
              <h2 class="h4 fw-bold text-center mb-3">Bienvenido</h2>
              <p class="text-center text-muted mb-4">Ingresa tu nombre para entrar al chat.</p>
              <div class="field-group mb-3">
                <label for="username" class="form-label fw-semibold text-success-emphasis">Nombre de usuario</label>
                <input type="text" id="username" class="form-control form-control-lg chat-input" placeholder="Ej. Maria" />
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-success btn-send" id="login">
                  Entrar al Chat
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>
    <script src="js/register.js"></script>
  </body>
</html>
