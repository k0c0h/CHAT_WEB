<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/register.css" />
  <link rel="icon" href="/img/logo.jpg" type="image/jpg">
  <title>Registrate</title>
</head>

<body>
  <header class="site-header shadow-sm">
    <div class="container py-3">
      <h1 class="h3 mb-0 fw-bold">ESPE-Alert</h1>
    </div>
  </header>
  <main class="container py-4 py-md-5 register-page">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-11 col-xxl-10">
        <div class="card register-card border-0 shadow-lg overflow-hidden">
          <div class="row g-0 align-items-stretch">
            <div class="col-lg-5 register-hero d-none d-lg-flex flex-column justify-content-between p-4 p-xl-5">
              <div>
                <span class="brand-pill mb-3 d-inline-flex">ESPE-Alert</span>
                <h2 class="display-6 fw-bold text-white mb-3">Acceso al centro de alertas</h2>
                <p class="text-white-50 mb-0">
                  Identifícate una sola vez para emitir avisos de emergencia en tiempo real.
                </p>
              </div>
              <div class="hero-stats mt-4">
                <div>
                  <strong>Seguridad</strong>
                  <span>Solo emisores registrados pueden entrar</span>
                </div>
              </div>
            </div>
            <div class="col-12 col-lg-7">
              <form action="#" method="post" class="register-form h-100" id="form">
                <div class="card-body p-4 p-md-5 p-xl-5">
                  <h2 class="h3 fw-bold text-center text-lg-start mb-2">Identificación del emisor</h2>
                  <p class="text-center text-lg-start text-muted mb-4">
                    Ingresa tu nombre para activar tu acceso al panel de alertas.
                  </p>
                  <div class="field-group mb-3">
                    <label for="username" class="form-label fw-semibold text-success-emphasis">Nombre de usuario</label>
                    <input type="text" id="username" class="form-control form-control-lg chat-input"
                      placeholder="Ej. Maria" />
                  </div>
                  <div class="d-grid d-sm-flex gap-2">
                    <button type="submit" class="btn btn-danger btn-send flex-grow-1" id="login">
                      Entrar al panel
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="js/register.js"></script>
</body>

</html>
